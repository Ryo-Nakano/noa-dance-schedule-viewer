<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        font-family: sans-serif;
        padding: 15px;
        margin: 0;
      }
      .container {
        display: flex;
        flex-direction: column;
        gap: 15px;
      }
      .drop-zone {
        border: 2px dashed #9e9e9e;
        border-radius: 8px;
        padding: 20px;
        text-align: center;
        color: #757575;
        background-color: #fafafa;
        transition: background-color 0.2s, border-color 0.2s;
        cursor: pointer;
      }
      .drop-zone.dragover {
        background-color: #e3f2fd;
        border-color: #1a73e8;
        color: #1a73e8;
      }
      .drop-zone input[type="file"] {
        display: none;
      }
      .drop-zone p {
        margin: 5px 0;
        font-size: 14px;
      }
      #statusMessage {
        font-size: 14px;
        color: #333;
        min-height: 20px;
        white-space: pre-wrap;
      }
      .error {
        color: #d32f2f !important;
      }
      .success {
        color: #2e7d32 !important;
      }
      button {
        padding: 8px 12px;
        cursor: pointer;
        background-color: #1a73e8;
        color: white;
        border: none;
        border-radius: 4px;
        font-weight: 500;
        transition: background-color 0.2s;
      }
      button:hover {
        background-color: #1557b0;
      }
      button:disabled {
        cursor: not-allowed;
        background-color: #e0e0e0;
        color: #9e9e9e;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="dropZone" class="drop-zone">
        <div id="dropStatus">
          <p>ここにJSONファイルをドラッグ&ドロップ</p>
          <p>またはクリックして選択</p>
        </div>
        <input type="file" id="jsonFile" accept=".json">
      </div>
      <div>
        <button id="uploadBtn">アップロード</button>
      </div>
      <div id="statusMessage"></div>
    </div>
    
    <script>
      let selectedFile = null;
      
      const dropZone = document.getElementById('dropZone');
      const fileInput = document.getElementById('jsonFile');
      const dropStatus = document.getElementById('dropStatus');
      const statusDiv = document.getElementById('statusMessage');
      const uploadBtn = document.getElementById('uploadBtn');

      // クリックでファイルダイアログを開く
      dropZone.addEventListener('click', function() {
        fileInput.click();
      });

      fileInput.addEventListener('change', function(e) {
        if (e.target.files.length > 0) {
          handleFileSelect(e.target.files[0]);
        }
      });

      // D&D イベントのハンドリング
      dropZone.addEventListener('dragover', function(e) {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });

      dropZone.addEventListener('dragleave', function() {
        dropZone.classList.remove('dragover');
      });

      dropZone.addEventListener('drop', function(e) {
        e.preventDefault();
        dropZone.classList.remove('dragover');

        if (e.dataTransfer.files.length > 0) {
          handleFileSelect(e.dataTransfer.files[0]);
        }
      });

      function handleFileSelect(file) {
        selectedFile = file;
        dropStatus.innerHTML = `<p>選択されたファイル:<br><strong>${file.name}</strong></p>
                                <p style="font-size: 12px; color: #999;">変更する場合はクリックまたは再ドロップ</p>`;
        statusDiv.innerText = '';
      }

      uploadBtn.addEventListener('click', function() {
        if (!selectedFile) {
          statusDiv.innerText = 'ファイルが選択されていません。';
          statusDiv.className = 'error';
          return;
        }

        const reader = new FileReader();

        statusDiv.innerText = '処理中...';
        statusDiv.className = '';
        uploadBtn.disabled = true;

        reader.onload = function(e) {
          const contents = e.target.result;
          
          google.script.run
            .withSuccessHandler(function(response) {
              if (response.status === 'success') {
                statusDiv.innerText = response.count + '件のデータを更新しました。';
                statusDiv.className = 'success';
              } else {
                statusDiv.innerText = response.message;
                statusDiv.className = 'error';
                uploadBtn.disabled = false;
              }
            })
            .withFailureHandler(function(error) {
              statusDiv.innerText = '通信エラーが発生しました。もう一度お試しください。\n' + (error.message || '');
              statusDiv.className = 'error';
              uploadBtn.disabled = false;
            })
            .processJsonUpload(contents);
        };

        reader.onerror = function() {
          statusDiv.innerText = 'ファイルの読み込みに失敗しました。';
          statusDiv.className = 'error';
          uploadBtn.disabled = false;
        };

        reader.readAsText(selectedFile);
      });
    </script>
  </body>
</html>
