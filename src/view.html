<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NOA Lesson Schedule Viewer</title>
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- React & ReactDOM CDN -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Lucide Icons CDN -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Babel CDN for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    [v-cloak] { display: none; }
  </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans">
  <div id="root"></div>

  <script id="lessons-data" type="application/json">
{{LESSONS_JSON_PLACEHOLDER}}
  </script>

  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;
    const ITEMS_PER_PAGE = 50;

    const getInitialData = () => {
      try {
        const el = document.getElementById('lessons-data');
        if (el && el.textContent && !el.textContent.includes('LESSONS_JSON_PLACEHOLDER')) {
          return JSON.parse(el.textContent);
        }
      } catch (e) {
        console.error('Failed to parse lessons data:', e);
      }
      return [];
    };

    const App = () => {
      const [data, setData] = useState(getInitialData);
      const [isLoading, setIsLoading] = useState(false); // 初期データはあるので false
      const [selectedItem, setSelectedItem] = useState(null);
      const [isFilterModalOpen, setIsFilterModalOpen] = useState(false);
      const [expandedSections, setExpandedSections] = useState([]);
      const [displayLimit, setDisplayLimit] = useState(ITEMS_PER_PAGE);

      // フィルター状態
      const [filters, setFilters] = useState({
        dayOfWeek: [],
        timeHour: [],
        storeName: [],
        genre: [],
        level: [],
        womanOnly: 'none' // 'none', 'only', 'exclude'
      });

      // フィルター用オプションの抽出
      const filterOptions = useMemo(() => {
        const options = {
          storeName: new Set(),
          genre: new Set(),
          level: new Set(),
          dayOfWeek: new Set(),
          timeHour: new Set()
        };

        data.forEach(item => {
          if (item.storeName) options.storeName.add(item.storeName);
          if (item.genre) options.genre.add(item.genre);
          if (item.level) options.level.add(item.level);
          if (item.dayOfWeek) options.dayOfWeek.add(item.dayOfWeek);
          if (item.startTime) options.timeHour.add(item.startTime.split(':')[0]);
        });

        return {
          storeName: Array.from(options.storeName).sort(),
          genre: Array.from(options.genre).sort(),
          level: Array.from(options.level).sort(),
          dayOfWeek: ['MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT', 'SUN'].filter(y => options.dayOfWeek.has(y)),
          timeHour: Array.from(options.timeHour).sort((a, b) => parseInt(a) - parseInt(b))
        };
      }, [data]);

      // フィルタリング適用
      const filteredData = useMemo(() => {
        return data.filter(item => {
          if (filters.dayOfWeek.length > 0 && !filters.dayOfWeek.includes(item.dayOfWeek)) return false;
          if (filters.timeHour.length > 0 && !filters.timeHour.includes(item.startTime.split(':')[0])) return false;
          if (filters.storeName.length > 0 && !filters.storeName.includes(item.storeName)) return false;
          if (filters.genre.length > 0 && !filters.genre.includes(item.genre)) return false;
          if (filters.level.length > 0 && !filters.level.includes(item.level)) return false;
          
          // 女性限定フィルター
          if (filters.womanOnly === 'only' && !item.isWomanOnly) return false;
          if (filters.womanOnly === 'exclude' && item.isWomanOnly) return false;

          return true;
        });
      }, [data, filters]);

      // ページネーションデータ
      const paginatedData = useMemo(() => {
        return filteredData.slice(0, displayLimit);
      }, [filteredData, displayLimit]);

      // フィルター変更時に表示件数をリセット
      useEffect(() => {
        setDisplayLimit(ITEMS_PER_PAGE);
      }, [filters]);

      const toggleFilter = (category, value) => {
        setFilters(prev => {
          const currentValues = prev[category];
          const isSelected = currentValues.includes(value);
          return {
            ...prev,
            [category]: isSelected
              ? currentValues.filter(v => v !== value)
              : [...currentValues, value]
          };
        });
      };

      const removeFilter = (category, value) => {
        setFilters(prev => ({
          ...prev,
          [category]: prev[category].filter(v => v !== value)
        }));
      };

      const clearAllFilters = () => {
        setFilters({ dayOfWeek: [], timeHour: [], storeName: [], genre: [], level: [], womanOnly: 'none' });
      };

      const selectAllInCategory = (category) => {
        setFilters(prev => ({ ...prev, [category]: [...filterOptions[category]] }));
      };

      const clearCategory = (category) => {
        setFilters(prev => ({ ...prev, [category]: [] }));
      };

      const toggleAccordion = (key) => {
        setExpandedSections(prev =>
          prev.includes(key) ? prev.filter(k => k !== key) : [...prev, key]
        );
      };

      const getDayLabel = (day) => {
        const labels = { MON: '月', TUE: '火', WED: '水', THU: '木', FRI: '金', SAT: '土', SUN: '日' };
        return labels[day] || day;
      };

      const activeFilterTags = useMemo(() => {
        const tags = [];
        Object.keys(filters).forEach(category => {
          if (category === 'womanOnly') {
            if (filters.womanOnly === 'only') tags.push({ category, value: 'only', displayValue: '女性限定のみ' });
            if (filters.womanOnly === 'exclude') tags.push({ category, value: 'exclude', displayValue: '女性限定を除く' });
          } else {
            filters[category].forEach(val => {
              let displayValue = val;
              if (category === 'dayOfWeek') displayValue = getDayLabel(val);
              if (category === 'timeHour') displayValue = `${val}:00台`;
              tags.push({ category, value: val, displayValue });
            });
          }
        });
        return tags;
      }, [filters]);

      // Lucide アイコンを React で使用するためのヘルパー
      const Icon = ({ name, className }) => {
        const spanRef = React.useRef(null);
        useEffect(() => {
          if (spanRef.current) {
            spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
            lucide.createIcons({
              root: spanRef.current,
              attrs: { class: className }
            });
          }
        }, [name, className]);
        return <span ref={spanRef} className="inline-flex"></span>;
      };

      return (
        <div className="min-h-screen bg-gray-50 text-gray-800 font-sans pb-20 md:pb-0 relative">
          <header className="bg-white shadow-sm border-b border-gray-200 sticky top-0 z-20">
            <div className="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
              <h1 className="text-lg font-bold text-gray-900 flex items-center gap-2">
                <Icon name="activity" className="w-5 h-5 text-blue-600" />
                NOA Viewer
              </h1>
              {/* GAS のWebアプリなのでリロードはブラウザのリロードで行う */}
            </div>

            {activeFilterTags.length > 0 && (
              <div className="max-w-3xl mx-auto px-4 py-2 bg-gray-50 border-t border-gray-200 flex items-center gap-2">
                <span className="text-xs text-gray-500 flex-shrink-0 flex items-center gap-1">
                  <Icon name="filter" className="w-3 h-3" /> 条件:
                </span>
                <div className="flex-1 overflow-x-auto whitespace-nowrap hide-scrollbar flex items-center gap-2">
                  {activeFilterTags.map((tag, idx) => (
                    <span
                      key={`${tag.category}-${tag.value}-${idx}`}
                      className="inline-flex items-center gap-1 px-2 py-1 rounded bg-white border border-gray-200 text-xs text-gray-700 shadow-sm shrink-0"
                    >
                      {tag.displayValue}
                      <button
                        onClick={() => {
                          if (tag.category === 'womanOnly') setFilters(prev => ({ ...prev, womanOnly: 'none' }));
                          else removeFilter(tag.category, tag.value);
                        }}
                        className="text-gray-400 hover:text-gray-600 p-0.5 rounded-full hover:bg-gray-100"
                      >
                        <Icon name="x" className="w-3 h-3" />
                      </button>
                    </span>
                  ))}
                </div>
                <button
                  onClick={clearAllFilters}
                  className="text-xs text-blue-600 hover:underline flex-shrink-0 ml-1"
                >
                  クリア
                </button>
              </div>
            )}
          </header>

          <main className="max-w-3xl mx-auto px-4 py-4">
            {data.length === 0 ? (
              <div className="flex flex-col items-center justify-center py-20 text-gray-500 bg-white rounded-lg border border-dashed border-gray-300">
                <p className="text-sm">データがありません</p>
              </div>
            ) : (
              <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div className="px-4 py-2 border-b border-gray-100 bg-gray-50 flex justify-between items-center">
                  <span className="text-xs font-medium text-gray-500">
                    {filteredData.length} 件中 {Math.min(displayLimit, filteredData.length)} 件を表示
                  </span>
                </div>

                <ul className="divide-y divide-gray-100">
                  {filteredData.length === 0 ? (
                    <li className="p-8 text-center text-sm text-gray-500">条件に一致するデータがありません</li>
                  ) : (
                    paginatedData.map(item => (
                      <li
                        key={item.lessonId}
                        onClick={() => setSelectedItem(item)}
                        className="p-4 active:bg-gray-50 md:hover:bg-blue-50 cursor-pointer transition-colors"
                      >
                        <div className="flex items-start justify-between">
                          <div className="flex-1 space-y-2">
                            <div className="flex flex-wrap items-center gap-x-3 gap-y-1 text-sm">
                              <div className="flex items-center gap-1.5 font-medium text-gray-900">
                                <span className={`text-xs px-1.5 py-0.5 rounded font-mono ${item.dayOfWeek === 'SUN' || item.dayOfWeek === 'SAT' ? 'bg-red-50 text-red-600' : 'bg-gray-100 text-gray-600'}`}>
                                  {getDayLabel(item.dayOfWeek)}
                                </span>
                                {item.startTime} - {item.endTime}
                              </div>
                              <div className="flex items-center gap-1 text-gray-600">
                                <Icon name="map-pin" className="w-3.5 h-3.5 text-gray-400" />
                                {item.storeName} <span className="text-xs text-gray-400">{item.studioName}</span>
                              </div>
                            </div>

                            <div className="flex flex-col md:flex-row md:items-center gap-1 md:gap-4">
                              <div className="font-bold text-gray-900 flex items-center gap-1.5 text-base">
                                <Icon name="user" className="w-4 h-4 text-gray-400" />
                                {item.instructorName}
                              </div>
                              <div className="text-sm text-gray-600 flex items-center gap-2">
                                <span className="bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full text-xs font-medium">
                                  {item.genre}
                                </span>
                                <span className="text-xs border border-gray-200 px-2 py-0.5 rounded-full text-gray-500">
                                  {item.level}
                                </span>
                                {item.isWomanOnly && (
                                  <span className="bg-pink-50 text-pink-600 px-2 py-0.5 rounded-full text-[10px] font-bold">
                                    女性限定
                                  </span>
                                )}
                              </div>
                            </div>
                          </div>
                          <Icon name="chevron-right" className="w-5 h-5 text-gray-300 flex-shrink-0 mt-2" />
                        </div>
                      </li>
                    ))
                  )}
                </ul>

                {displayLimit < filteredData.length && (
                  <div className="p-4 border-t border-gray-100 bg-white text-center">
                    <button
                      onClick={() => setDisplayLimit(prev => prev + ITEMS_PER_PAGE)}
                      className="inline-flex items-center gap-2 px-8 py-3 bg-white border border-gray-300 rounded-xl text-sm font-bold text-gray-700 hover:bg-gray-50 active:scale-95 transition-all shadow-sm"
                    >
                      <Icon name="chevron-down" className="w-4 h-4 text-gray-400" />
                      もっと見る
                    </button>
                  </div>
                )}
              </div>
            )}
          </main>

          <button
            onClick={() => setIsFilterModalOpen(true)}
            className="fixed bottom-6 right-6 md:bottom-10 md:right-10 bg-blue-600 text-white p-4 rounded-full shadow-lg hover:bg-blue-700 transition-transform active:scale-95 z-30 flex items-center justify-center"
          >
            <Icon name="filter" className="w-6 h-6" />
          </button>

          {isFilterModalOpen && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setIsFilterModalOpen(false)} />
              <div className="relative bg-white w-full max-w-md max-h-[85vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
                <div className="flex items-center justify-between p-4 border-b border-gray-200 bg-white shrink-0">
                  <button onClick={() => setIsFilterModalOpen(false)} className="p-2 text-gray-500 hover:bg-gray-100 rounded-full transition-colors">
                    <Icon name="x" className="w-6 h-6" />
                  </button>
                  <h2 className="text-lg font-bold text-gray-900">絞り込み</h2>
                  <button onClick={clearAllFilters} className="text-sm font-medium text-gray-500 hover:text-gray-900 px-2 py-1">クリア</button>
                </div>

                <div className="flex-1 overflow-y-auto bg-gray-50 pb-4">
                  <div className="divide-y divide-gray-200 bg-white border-y border-gray-200 mt-2">
                    {/* 女性限定フィルター（アコーディオン同列） */}
                    <div className="bg-white">
                      <button onClick={() => toggleAccordion('womanOnly')} className="w-full flex items-center justify-between p-4 text-left hover:bg-gray-50 transition-colors">
                        <div className="flex items-center gap-2">
                          <span className="font-bold text-gray-900">女性限定</span>
                          {filters.womanOnly !== 'none' && <span className="bg-pink-600 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full">1</span>}
                        </div>
                        {expandedSections.includes('womanOnly') ? <Icon name="chevron-up" className="w-5 h-5 text-gray-400" /> : <Icon name="chevron-down" className="w-5 h-5 text-gray-400" />}
                      </button>
                      {expandedSections.includes('womanOnly') && (
                        <div className="px-4 pb-4 pt-1 flex flex-col gap-2">
                          {[
                            { key: 'none', label: '指定しない' },
                            { key: 'only', label: '女性限定のみ表示' },
                            { key: 'exclude', label: '女性限定を除く' }
                          ].map(opt => (
                            <label key={opt.key} className="flex items-center gap-3 p-3 rounded-lg border border-gray-200 bg-white cursor-pointer active:bg-gray-50">
                              <input
                                type="radio"
                                name="womanOnly"
                                checked={filters.womanOnly === opt.key}
                                onChange={() => setFilters(prev => ({ ...prev, womanOnly: opt.key }))}
                                className="w-5 h-5 text-blue-600"
                              />
                              <span className="text-sm font-medium text-gray-700">{opt.label}</span>
                            </label>
                          ))}
                        </div>
                      )}
                    </div>

                    {[
                      { key: 'dayOfWeek', label: '曜日', options: filterOptions.dayOfWeek },
                      { key: 'timeHour', label: '時間帯', options: filterOptions.timeHour },
                      { key: 'storeName', label: '店舗', options: filterOptions.storeName },
                      { key: 'genre', label: 'ジャンル', options: filterOptions.genre },
                      { key: 'level', label: 'レベル', options: filterOptions.level },
                    ].map(section => {
                      const isExpanded = expandedSections.includes(section.key);
                      const selectedCount = filters[section.key].length;
                      return (
                        <div key={section.key} className="bg-white">
                          <button onClick={() => toggleAccordion(section.key)} className="w-full flex items-center justify-between p-4 text-left hover:bg-gray-50 transition-colors">
                            <div className="flex items-center gap-2">
                              <span className="font-bold text-gray-900">{section.label}</span>
                              {selectedCount > 0 && <span className="bg-blue-600 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full">{selectedCount}</span>}
                            </div>
                            {isExpanded ? <Icon name="chevron-up" className="w-5 h-5 text-gray-400" /> : <Icon name="chevron-down" className="w-5 h-5 text-gray-400" />}
                          </button>
                          {isExpanded && (
                            <div className="px-4 pb-4 pt-1">
                              <div className="flex gap-4 mb-3 pb-3 border-b border-gray-100">
                                <button onClick={() => selectAllInCategory(section.key)} className="text-sm text-blue-600 font-medium">すべて選択</button>
                                <button onClick={() => clearCategory(section.key)} className="text-sm text-gray-500 font-medium">解除</button>
                              </div>
                              <div className="flex flex-wrap gap-2">
                                {section.options.map(option => {
                                  const isSelected = filters[section.key].includes(option);
                                  const label = section.key === 'dayOfWeek' ? getDayLabel(option) : (section.key === 'timeHour' ? `${option}:00台` : option);
                                  return (
                                    <button
                                      key={option}
                                      onClick={() => toggleFilter(section.key, option)}
                                      className={`px-4 py-2 rounded-full text-sm font-medium border ${isSelected ? 'bg-blue-50 border-blue-600 text-blue-700' : 'bg-white border-gray-300 text-gray-700'}`}
                                    >
                                      {label}
                                    </button>
                                  );
                                })}
                              </div>
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>

                <div className="p-4 bg-white border-t border-gray-200">
                  <button onClick={() => setIsFilterModalOpen(false)} className="w-full bg-blue-600 text-white py-3.5 rounded-xl font-bold text-lg">{filteredData.length}件表示</button>
                </div>
              </div>
            </div>
          )}

          {selectedItem && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
              <div className="absolute inset-0 bg-black/40 backdrop-blur-sm" onClick={() => setSelectedItem(null)} />
              <div className="relative bg-white w-full max-w-md max-h-[85vh] rounded-2xl shadow-2xl overflow-hidden flex flex-col">
                <div className="sticky top-0 bg-white/95 backdrop-blur border-b border-gray-100 px-4 py-3 flex justify-between items-center z-10 shrink-0">
                  <h3 className="font-bold text-gray-900">レッスン詳細</h3>
                  <button onClick={() => setSelectedItem(null)} className="p-1.5 bg-gray-100 rounded-full text-gray-500 hover:bg-gray-200 transition-colors">
                    <Icon name="x" className="w-5 h-5" />
                  </button>
                </div>

                <div className="overflow-y-auto p-5">
                  <div className="flex flex-col items-center text-center mb-6 pb-6 border-b border-gray-100">
                    {selectedItem.instructorImageUrl ? (
                      <img src={selectedItem.instructorImageUrl} alt={selectedItem.instructorName} className="w-24 h-24 object-cover rounded-full shadow-md bg-gray-100 mb-3" />
                    ) : (
                      <div className="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-center shadow-md mb-3 border-2 border-white">
                        <Icon name="user" className="w-10 h-10 text-gray-300" />
                      </div>
                    )}
                    <h4 className="text-xl font-bold text-gray-900">{selectedItem.instructorName}</h4>
                    {selectedItem.nickname && <p className="text-sm text-gray-500 mb-3">({selectedItem.nickname})</p>}
                    <div className="flex items-center gap-2 justify-center mt-1">
                      <span className="px-3 py-1 rounded-full text-xs font-medium bg-blue-100 text-blue-800">{selectedItem.genre}</span>
                      <span className="px-3 py-1 rounded-full text-xs font-medium border border-gray-200 text-gray-600">{selectedItem.level}</span>
                    </div>
                  </div>

                  <div className="bg-gray-50 rounded-xl p-4 space-y-4">
                    <div className="flex items-start gap-3">
                      <Icon name="calendar" className="w-5 h-5 text-gray-400 mt-0.5 shrink-0" />
                      <div>
                        <div className="text-xs text-gray-500 font-medium mb-0.5">日付</div>
                        <div className="text-sm font-medium text-gray-900">
                          {selectedItem.date} <span className="bg-gray-200 text-gray-700 px-1.5 py-0.5 rounded text-xs ml-1 font-mono">{getDayLabel(selectedItem.dayOfWeek)}</span>
                        </div>
                      </div>
                    </div>
                    <div className="flex items-start gap-3">
                      <Icon name="clock" className="w-5 h-5 text-gray-400 mt-0.5 shrink-0" />
                      <div>
                        <div className="text-xs text-gray-500 font-medium mb-0.5">時間</div>
                        <div className="text-sm font-bold text-gray-900">{selectedItem.startTime} - {selectedItem.endTime}</div>
                      </div>
                    </div>
                    <div className="flex items-start gap-3">
                      <Icon name="map-pin" className="w-5 h-5 text-gray-400 mt-0.5 shrink-0" />
                      <div>
                        <div className="text-xs text-gray-500 font-medium mb-0.5">場所</div>
                        <div className="text-sm font-medium text-gray-900">{selectedItem.storeName} <span className="text-gray-500 text-xs ml-1">{selectedItem.studioName}</span></div>
                      </div>
                    </div>
                  </div>

                  {selectedItem.url && (
                    <div className="mt-6">
                      <a href={selectedItem.url} target="_blank" rel="noopener noreferrer" className="block w-full py-3.5 px-4 bg-gray-900 hover:bg-gray-800 text-white text-center rounded-xl font-bold font-lg shadow-sm">
                        公式サイトで予約・確認する
                      </a>
                    </div>
                  )}
                </div>
              </div>
            </div>
          )}
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
